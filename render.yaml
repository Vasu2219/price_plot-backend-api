services:
  - type: web
    name: price-plot-backend-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health.php
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: price_plot
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: qwen2.5:3b
